name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable
      - name: test compute
        working-directory: compute-rust
        run: cargo test --all

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: build + test gateway
        working-directory: gateway-go
        run: |
          go vet ./...
          go test ./...
          go build ./...

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: test inference
        working-directory: inference-python
        run: |
          pip install -e ".[dev]"
          ruff check feastream_infer
          pytest -q
      - name: offline verify
        run: python scripts/verify.py

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: build cockpit
        working-directory: cockpit-ts
        run: |
          npm install
          npm run build
